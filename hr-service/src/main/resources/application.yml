server:
  port: ${HR_SERVICE_PORT:8001}
  forward-headers-strategy: framework

gateway:
  url: ${GATEWAY_URL:http://localhost:9000}

spring:
  application:
    name: hr-service
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false
  output:
    ansi:
      enabled: always
  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-rapid-thunder-aio4c6y7-pooler.c-4.us-east-1.aws.neon.tech/hr_service_db?sslmode=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_0NfvBHSXDru8}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${HR_SHOW_SQL:false}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: basic

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka123}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"

# Ngưỡng Euclidean (giống face-api.js): nhỏ hơn = giống hơn; thử 0.45–0.6 tùy camera/ánh sáng
app:
  face-match:
    distance-threshold: ${FACE_MATCH_DISTANCE_THRESHOLD:0.55}

springdoc:
  api-docs:
    path: /api/hr/v3/api-docs
  swagger-ui:
    path: /api/hr/swagger-ui.html
    url: /api/hr/v3/api-docs
  show-actuator: false
