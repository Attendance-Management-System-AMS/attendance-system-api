server:
  port: ${HR_SERVICE_PORT:9001}

spring:
  application:
    name: hr-service
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${HR_DB_URL:jdbc:postgresql://localhost:5432/attendance_hr}
    username: ${HR_DB_USERNAME:attendance}
    password: ${HR_DB_PASSWORD:attendance}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  face-match:
    distance-threshold: ${FACE_MATCH_DISTANCE_THRESHOLD:0.55}

jwt:
  secret: ${JWT_SECRET:local-development-jwt-secret-change-me-32-chars}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  issuer: ${JWT_ISSUER:auth-service}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:${EUREKA_HOST:localhost}}

springdoc:
  api-docs:
    path: /v3/api-docs

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %highlight(%-5level) %clr([%20.20thread]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %msg%n%wEx"
  level:
    root: INFO
    com.attendance: DEBUG
