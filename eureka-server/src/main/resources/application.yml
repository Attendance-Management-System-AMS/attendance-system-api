server:
  port: ${EUREKA_SERVER_PORT:8761}

spring:
  application:
    name: eureka-server
  output:
    ansi:
      enabled: ALWAYS

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  server:
    wait-time-in-ms-when-sync-empty: 0

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %highlight(%-5level) %clr([%20.20thread]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %msg%n%wEx"
  level:
    root: INFO
    com.attendance: DEBUG
