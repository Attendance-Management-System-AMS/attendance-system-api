server:
  port: ${EUREKA_PORT:8761}

spring:
  application:
    name: eureka-server
  security:
    user:
      name: ${EUREKA_USER:eureka}
      password: ${EUREKA_PASSWORD:eureka123}
  output:
    ansi:
      enabled: always

eureka:
  dashboard:
    username: ${EUREKA_USER:eureka}
    password: ${EUREKA_PASSWORD:eureka123}
  instance:
    hostname: ${EUREKA_HOST:localhost}
  client:
    # Eureka server không cần tự đăng ký với chính nó
    register-with-eureka: false
    fetch-registry: false
    service-url:
      # Cùng cổng với server.port; giữ trùng EUREKA_PORT khi cấu hình client (hr, attendance, gateway)
      defaultZone: http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka123}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
