name: attendance-system-api

x-service-build: &service-build
  context: .
  dockerfile: docker/Dockerfile.service

x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
  EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXPIRATION: ${JWT_EXPIRATION:-900000}
  JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
  JWT_ISSUER: ${JWT_ISSUER:-attendance-auth-service}
  SHOW_SQL: ${SHOW_SQL:-false}

services:
  eureka-server:
    build:
      <<: *service-build
      args:
        MODULE_NAME: eureka-server
    container_name: eureka-server
    environment:
      EUREKA_SERVER_PORT: 8761
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    expose:
      - "8761"
    restart: unless-stopped
    networks:
      - backend

  auth-service:
    build:
      <<: *service-build
      args:
        MODULE_NAME: auth-service
    container_name: auth-service
    environment:
      <<: *common-env
      AUTH_SERVICE_PORT: 9004
      EUREKA_INSTANCE_HOSTNAME: auth-service
      AUTH_DB_URL: ${AUTH_DB_URL}
      AUTH_DB_USERNAME: ${AUTH_DB_USERNAME}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      SEED_DEFAULT_USERS: ${SEED_DEFAULT_USERS:-false}
    expose:
      - "9004"
    depends_on:
      - eureka-server
    restart: unless-stopped
    networks:
      - backend

  hr-service:
    build:
      <<: *service-build
      args:
        MODULE_NAME: hr-service
    container_name: hr-service
    environment:
      <<: *common-env
      HR_SERVICE_PORT: 9001
      EUREKA_INSTANCE_HOSTNAME: hr-service
      HR_DB_URL: ${HR_DB_URL}
      HR_DB_USERNAME: ${HR_DB_USERNAME}
      HR_DB_PASSWORD: ${HR_DB_PASSWORD}
      FACE_MATCH_DISTANCE_THRESHOLD: ${FACE_MATCH_DISTANCE_THRESHOLD:-0.55}
    expose:
      - "9001"
    depends_on:
      - eureka-server
    restart: unless-stopped
    networks:
      - backend

  attendance-service:
    build:
      <<: *service-build
      args:
        MODULE_NAME: attendance-service
    container_name: attendance-service
    environment:
      <<: *common-env
      ATTENDANCE_SERVICE_PORT: 9002
      EUREKA_INSTANCE_HOSTNAME: attendance-service
      ATTENDANCE_DB_URL: ${ATTENDANCE_DB_URL}
      ATTENDANCE_DB_USERNAME: ${ATTENDANCE_DB_USERNAME}
      ATTENDANCE_DB_PASSWORD: ${ATTENDANCE_DB_PASSWORD}
      MIN_CHECKOUT_AFTER_MINUTES: ${MIN_CHECKOUT_AFTER_MINUTES:-30}
      ATTENDANCE_KIOSK_TOKEN_EXPIRATION_SECONDS: ${ATTENDANCE_KIOSK_TOKEN_EXPIRATION_SECONDS:-300}
      ATTENDANCE_KIOSK_ALLOWED_CLOCK_SKEW_SECONDS: ${ATTENDANCE_KIOSK_ALLOWED_CLOCK_SKEW_SECONDS:-30}
      ATTENDANCE_KIOSK_NONCE_TTL_SECONDS: ${ATTENDANCE_KIOSK_NONCE_TTL_SECONDS:-120}
    expose:
      - "9002"
    depends_on:
      - eureka-server
      - hr-service
    restart: unless-stopped
    networks:
      - backend

  api-gateway:
    build:
      <<: *service-build
      args:
        MODULE_NAME: api-gateway
    container_name: api-gateway
    environment:
      <<: *common-env
      API_GATEWAY_PORT: 9000
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "${API_GATEWAY_PORT:-9000}:9000"
    depends_on:
      - eureka-server
      - auth-service
      - hr-service
      - attendance-service
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge
