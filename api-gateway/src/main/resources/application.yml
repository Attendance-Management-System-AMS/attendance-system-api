server:
  port: ${GATEWAY_PORT:9000}

spring:
  application:
    name: api-gateway
  output:
    ansi:
      enabled: always
  cloud:
    gateway:
      routes:
        - id: hr-service-docs
          uri: lb://hr-service
          predicates:
            - Path=/api/hr/v3/api-docs

        - id: attendance-service-docs
          uri: lb://attendance-service
          predicates:
            - Path=/api/attendance/v3/api-docs

        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/v3/api-docs

        - id: hr-service
          uri: lb://hr-service
          predicates:
            - Path=/api/hr/**
          # filters:
          #   - JwtAuthenticationFilter

        - id: attendance-service
          uri: lb://attendance-service
          predicates:
            - Path=/api/attendance/**
          filters:
            - JwtAuthenticationFilter

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka123}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    disable-swagger-default-url: true
    urls:
      - url: /api/hr/v3/api-docs
        name: HR Service
      - url: /api/attendance/v3/api-docs
        name: Attendance Service
      - url: /api/auth/v3/api-docs
        name: Auth Service
    path: /swagger-ui/index.html
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"

jwt:
  secret: ${JWT_SECRET:AMS_DEFAULT_SECRET_KEY_PLEASE_CHANGE_IN_PROD_32CHARS}