spring:
  application:
    name: api-gateway
  output:
    ansi:
      enabled: always
  cloud:
    gateway:
      routes:
        - id: hr-service
          uri: ${gateway.targets.hr}
          predicates:
            - Path=/api/hr/**
          filters:
            - JwtAuthenticationFilter

        - id: attendance-service
          uri: ${gateway.targets.attendance}
          predicates:
            - Path=/api/attendance/**
          filters:
            - JwtAuthenticationFilter

        - id: auth-service
          uri: ${gateway.targets.auth}
          predicates:
            - Path=/api/auth/**

server:
  port: 8000

gateway:
  targets:
    hr: http://localhost:8001
    attendance: http://localhost:8002
    auth: http://localhost:8004

eureka:
  client:
    enabled: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    disable-swagger-default-url: true
    path: /swagger-ui.html
    urls:
      - name: 1. Nhân sự & Đơn từ (HR)
        url: /api/hr/v3/api-docs
      - name: 2. Chấm công (Attendance)
        url: /api/attendance/v3/api-docs
      - name: 3. Xác thực (Auth)
        url: /api/auth/v3/api-docs
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"

jwt:
  secret: "YOUR_VERY_SECRET_KEY_THAT_IS_LONG_ENOUGH_FOR_HS256_ALGORITHM_MIN_32_CHARS"