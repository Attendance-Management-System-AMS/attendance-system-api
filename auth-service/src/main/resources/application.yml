server:
  port: ${AUTH_SERVICE_PORT:9004}

spring:
  application:
    name: auth-service
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/attendance_auth}
    username: ${AUTH_DB_USERNAME:attendance}
    password: ${AUTH_DB_PASSWORD:attendance}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:local-development-jwt-secret-change-me-32-chars}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  issuer: ${JWT_ISSUER:auth-service}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  seed:
    default-users: ${SEED_DEFAULT_USERS:false}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

springdoc:
  api-docs:
    path: /v3/api-docs

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %highlight(%-5level) %clr([%20.20thread]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %msg%n%wEx"
  level:
    root: INFO
    com.attendance: DEBUG
